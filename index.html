<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantopaghi.it</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px
}

.box{
background:white;
padding:40px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0 10px 20px rgba(0,0,0,0.1)
}

input{
padding:10px;
margin:10px;
width:200px;
border-radius:6px;
border:1px solid #ccc
}

button{
background:#2ecc71;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:6px;
color:white;
cursor:pointer
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold
}
</style>
</head>

<body>

<div class="box">

<h1>Quanto stai pagando davvero l'energia?</h1>

<p>Inserisci i dati della tua bolletta</p>

<input id="costo" placeholder="Costo bolletta €">

<br>

<input id="kwh" placeholder="Consumo kWh">

<br><br>

<button onclick="calcola()">Calcola €/kWh</button>

<div class="result" id="risultato"></div>

</div>

<script>

function calcola(){

var costo = document.getElementById("costo").value
var kwh = document.getElementById("kwh").value

var prezzo = costo / kwh

document.getElementById("risultato").innerHTML =
"Stai pagando circa " + prezzo.toFixed(2) + " €/kWh"

}

</script>

</body>
</html>
